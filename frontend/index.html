<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBLE Backend Testing Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .card-wide {
            grid-column: 1 / -1;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #f093fb;
            color: white;
        }

        .btn-secondary:hover {
            background: #e07ce0;
            transform: scale(1.02);
        }

        .btn-success {
            background: #4ade80;
            color: white;
        }

        .btn-success:hover {
            background: #3dc871;
            transform: scale(1.02);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9em;
            min-width: auto;
            flex: none;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 15px;
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            color: #667eea;
        }

        .file-input-wrapper:hover .file-input-label {
            background: #f0f4ff;
            border-color: #5568d3;
        }

        .file-input-wrapper input[type=file]:focus + .file-input-label {
            background: #f0f4ff;
            border-color: #5568d3;
        }

        .file-name {
            margin-top: 10px;
            padding: 10px;
            background: #e8f4f8;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            color: #333;
            word-break: break-all;
        }

        .results {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
            max-height: 400px;
            overflow-y: auto;
        }

        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .status-loading {
            background: #fef3c7;
            color: #b45309;
        }

        .status-success {
            background: #dcfce7;
            color: #166534;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .test-result {
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .test-pass {
            background: #dcfce7;
            border-left-color: #4ade80;
        }

        .test-fail {
            background: #fee2e2;
            border-left-color: #f87171;
        }

        .test-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #f0f0f0;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            overflow-x: auto;
        }

        .tab {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .infrastructure-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .component {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4ade80;
        }

        .component-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .component-status {
            font-size: 0.9em;
            color: #666;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            color: #1e40af;
        }

        .error-box {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 WEBLE Backend Testing</h1>
            <p>AI-Powered STEP to IKEA Assembly Instructions</p>
        </header>

        <div class="main-grid">
            <!-- Health Check Card -->
            <div class="card">
                <h2>System Health</h2>
                <div class="section">
                    <div class="button-group">
                        <button class="btn-primary" onclick="checkHealth()">Check Health</button>
                        <button class="btn-secondary btn-small" onclick="checkDetailedHealth()">Detailed</button>
                    </div>
                </div>
                <div id="healthResults" class="results" style="display:none;"></div>
            </div>

            <!-- Test Runner Card -->
            <div class="card">
                <h2>Run Tests</h2>
                <div class="section">
                    <div class="button-group">
                        <button class="btn-success" onclick="runAllTests()">All Tests</button>
                        <button class="btn-secondary btn-small" onclick="listTests()">List</button>
                    </div>
                </div>
                <div class="section-title">Specific Module</div>
                <div class="button-group">
                    <button class="btn-secondary btn-small" onclick="runSpecificTest('test_step_loader')">Step Loader</button>
                    <button class="btn-secondary btn-small" onclick="runSpecificTest('test_parts_extractor')">Parts</button>
                    <button class="btn-secondary btn-small" onclick="runSpecificTest('test_svg_generator')">SVG</button>
                    <button class="btn-secondary btn-small" onclick="runSpecificTest('test_assembly_generator')">Assembly</button>
                    <button class="btn-secondary btn-small" onclick="runSpecificTest('test_api_endpoints')">API</button>
                </div>
                <div id="testResults" class="results" style="display:none;"></div>
            </div>

            <!-- Infrastructure Status Card -->
            <div class="card">
                <h2>Infrastructure</h2>
                <div class="section">
                    <button class="btn-primary" onclick="checkInfrastructure()">Get Status</button>
                </div>
                <div id="infraResults" class="results" style="display:none;"></div>
            </div>

            <!-- STEP File Upload Card -->
            <div class="card">
                <h2>Upload & Process</h2>
                <div class="section">
                    <div class="file-input-wrapper">
                        <input type="file" id="stepFile" accept=".step,.stp" onchange="updateFileName()">
                        <label for="stepFile" class="file-input-label">
                            📁 Click or drag a STEP file here (.step or .stp)
                        </label>
                    </div>
                    <div id="fileName" class="file-name" style="display:none;"></div>
                </div>
                <div class="section">
                    <button class="btn-primary" onclick="uploadFile()" id="uploadBtn" disabled>Upload & Process</button>
                </div>
                <div id="uploadResults" class="results" style="display:none;"></div>
            </div>

            <!-- Full Testing Dashboard -->
            <div class="card card-wide">
                <h2>Full Testing Dashboard</h2>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchTab(event, 'summary')">Summary</button>
                    <button class="tab" onclick="switchTab(event, 'details')">Details</button>
                    <button class="tab" onclick="switchTab(event, 'logs')">Logs</button>
                </div>

                <div id="summary" class="tab-content active">
                    <button class="btn-success" onclick="runFullDashboard()">Run Full Test Suite</button>
                    <div id="summaryResults" class="results" style="display:none; margin-top: 15px;"></div>
                </div>

                <div id="details" class="tab-content">
                    <p style="color: #666; margin-bottom: 15px;">Run all tests to see detailed results here.</p>
                    <button class="btn-success" onclick="runFullDashboard()">Run Full Test Suite</button>
                    <div id="detailResults" class="results" style="display:none; margin-top: 15px;"></div>
                </div>

                <div id="logs" class="tab-content">
                    <button class="btn-primary btn-small" onclick="clearLogs()" style="width: auto;">Clear Logs</button>
                    <div id="logsOutput" class="results" style="display:block; margin-top: 15px; font-family: 'Courier New', monospace; font-size: 0.9em;"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer style="text-align: center; color: white; margin-top: 40px; opacity: 0.8;">
            <p>WEBLE Testing Interface | Backend: <span id="backendUrlLabel">Loading...</span></p>
        </footer>
    </div>

    <script>
        const API_BASE = (window.location.protocol === 'http:' || window.location.protocol === 'https:')
            ? window.location.origin
            : 'http://localhost:8000';
        const API_URL = `${API_BASE}/api/v1`;
        let logs = [];

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            logs.push(`[${timestamp}] ${message}`);
            updateLogsDisplay();
        }

        function updateLogsDisplay() {
            const logsDiv = document.getElementById('logsOutput');
            logsDiv.innerHTML = logs.map(log => `<div>${escapeHtml(log)}</div>`).join('');
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function clearLogs() {
            logs = [];
            updateLogsDisplay();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showResults(elementId, status, data) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            
            let html = `<div class="status status-${status}">${status.toUpperCase()}</div>`;
            
            if (data.test_results) {
                html += `
                    <div class="test-summary">
                        <div class="stat-box">
                            <div class="stat-number">${data.test_results.passed || 0}</div>
                            <div class="stat-label">Passed</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number">${data.test_results.failed || 0}</div>
                            <div class="stat-label">Failed</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number">${data.test_results.total || 0}</div>
                            <div class="stat-label">Total</div>
                        </div>
                    </div>
                    <div style="margin-top: 15px; padding: 10px; background: #f0f0f0; border-radius: 6px;">
                        <strong>Summary:</strong> ${data.test_results.summary || 'N/A'}
                    </div>
                `;
                
                if (data.tests && data.tests.length > 0) {
                    html += '<div style="margin-top: 15px;"><strong>Sample Results:</strong></div>';
                    data.tests.slice(0, 5).forEach(test => {
                        const testClass = test.status === 'PASSED' ? 'test-pass' : 'test-fail';
                        html += `<div class="test-result ${testClass}">${test.name}: ${test.status}</div>`;
                    });
                    if (data.tests.length > 5) {
                        html += `<div style="padding: 10px; color: #999;">... and ${data.tests.length - 5} more tests</div>`;
                    }
                }
            } else {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            element.innerHTML = html;
        }

        function showError(elementId, error) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.innerHTML = `
                <div class="status status-error">ERROR</div>
                <div class="error-box">
                    <strong>Error:</strong><br>
                    ${escapeHtml(error)}
                </div>
            `;
        }

        async function checkHealth() {
            addLog('Checking system health...');
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                showResults('healthResults', 'success', data);
                addLog('Health check completed successfully');
            } catch (error) {
                showError('healthResults', error.message);
                addLog(`Health check failed: ${error.message}`, 'error');
            }
        }

        async function checkDetailedHealth() {
            addLog('Checking detailed health...');
            try {
                const response = await fetch(`${API_URL}/health/detailed`);
                const data = await response.json();
                showResults('healthResults', 'success', data);
                addLog('Detailed health check completed');
            } catch (error) {
                showError('healthResults', error.message);
                addLog(`Detailed health check failed: ${error.message}`, 'error');
            }
        }

        async function runAllTests() {
            addLog('Running all tests...');
            document.getElementById('testResults').innerHTML = '<div class="loading-spinner"></div> Running tests...';
            document.getElementById('testResults').style.display = 'block';
            
            try {
                const response = await fetch(`${API_URL}/health/tests`);
                const data = await response.json();
                if (data.test_results && data.test_results.passed > 0) {
                    showResults('testResults', 'success', data);
                    addLog(`Tests completed: ${data.test_results.summary}`);
                } else {
                    showResults('testResults', 'info', data);
                    addLog(`Tests completed: ${data.test_results.summary || 'See details'}`);
                }
            } catch (error) {
                showError('testResults', error.message);
                addLog(`Test execution failed: ${error.message}`, 'error');
            }
        }

        async function runSpecificTest(module) {
            addLog(`Running ${module} tests...`);
            document.getElementById('testResults').innerHTML = '<div class="loading-spinner"></div> Running tests...';
            document.getElementById('testResults').style.display = 'block';
            
            try {
                const response = await fetch(`${API_URL}/health/tests/${module}`);
                const data = await response.json();
                showResults('testResults', 'success', data);
                addLog(`${module} tests completed: ${data.test_results.summary}`);
            } catch (error) {
                showError('testResults', error.message);
                addLog(`${module} test execution failed: ${error.message}`, 'error');
            }
        }

        async function listTests() {
            addLog('Listing available tests...');
            try {
                const response = await fetch(`${API_URL}/health/tests/list`);
                const data = await response.json();
                
                const element = document.getElementById('testResults');
                element.style.display = 'block';
                
                let html = `<div class="status status-info">INFO</div>`;
                html += `<div class="stat-box" style="margin-top: 10px;"><div class="stat-number">${data.total_available_tests || 0}</div><div class="stat-label">Available Tests</div></div>`;
                
                if (data.tests && data.tests.length > 0) {
                    html += '<div style="margin-top: 15px;"><strong>Tests:</strong></div>';
                    data.tests.slice(0, 10).forEach(test => {
                        html += `<div style="padding: 8px; background: #f9f9f9; margin: 5px 0; border-radius: 4px; font-size: 0.9em;">${escapeHtml(test)}</div>`;
                    });
                    if (data.tests.length > 10) {
                        html += `<div style="padding: 10px; color: #999;">... and ${data.tests.length - 10} more tests</div>`;
                    }
                }
                
                element.innerHTML = html;
                addLog(`Found ${data.total_available_tests} available tests`);
            } catch (error) {
                showError('testResults', error.message);
                addLog(`Failed to list tests: ${error.message}`, 'error');
            }
        }

        async function checkInfrastructure() {
            addLog('Checking infrastructure status...');
            try {
                const response = await fetch(`${API_URL}/health/tests/status`);
                const data = await response.json();
                
                const element = document.getElementById('infraResults');
                element.style.display = 'block';
                
                let html = `<div class="status status-success">OPERATIONAL</div>`;
                
                if (data.infrastructure && data.infrastructure.components) {
                    const components = data.infrastructure.components;
                    html += '<div class="infrastructure-grid">';
                    
                    for (const [name, status] of Object.entries(components)) {
                        if (typeof status === 'object') {
                            for (const [subname, substatus] of Object.entries(status)) {
                                html += `<div class="component"><div class="component-name">${escapeHtml(subname)}</div><div class="component-status">${escapeHtml(String(substatus))}</div></div>`;
                            }
                        } else {
                            html += `<div class="component"><div class="component-name">${escapeHtml(name)}</div><div class="component-status">${escapeHtml(String(status))}</div></div>`;
                        }
                    }
                    
                    html += '</div>';
                }
                
                element.innerHTML = html;
                addLog('Infrastructure check completed');
            } catch (error) {
                showError('infraResults', error.message);
                addLog(`Infrastructure check failed: ${error.message}`, 'error');
            }
        }

        function updateFileName() {
            const fileInput = document.getElementById('stepFile');
            const fileNameDiv = document.getElementById('fileName');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileNameDiv.textContent = '✓ Selected: ' + file.name + ' (' + (file.size / 1024).toFixed(2) + ' KB)';
                fileNameDiv.style.display = 'block';
                uploadBtn.disabled = false;
                addLog(`File selected: ${file.name}`);
            } else {
                fileNameDiv.style.display = 'none';
                uploadBtn.disabled = true;
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('stepFile');
            if (!fileInput.files.length) return;
            
            const file = fileInput.files[0];
            addLog(`Uploading file: ${file.name}`);
            
            const formData = new FormData();
            formData.append('file', file);
            
            document.getElementById('uploadResults').innerHTML = '<div class="loading-spinner"></div> Uploading and processing...';
            document.getElementById('uploadResults').style.display = 'block';
            
            try {
                const response = await fetch(`${API_URL}/step/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const element = document.getElementById('uploadResults');
                    element.style.display = 'block';
                    
                    let html = `<div class="status status-success">SUCCESS</div>`;
                    html += `<div class="info-box" style="margin-top: 10px;">`;
                    html += `<strong>Job ID:</strong> <code>${escapeHtml(data.job_id)}</code><br>`;
                    html += `<strong>Model ID:</strong> <code>${escapeHtml(data.model_id)}</code><br>`;
                    html += `<strong>Status:</strong> ${escapeHtml(data.status)}<br>`;
                    html += `<strong>Est. Time:</strong> ${data.estimated_time_seconds} seconds`;
                    html += `</div>`;
                    
                    element.innerHTML = html;
                    addLog(`File uploaded successfully. Job ID: ${data.job_id}`);
                } else {
                    showError('uploadResults', data.error || 'Upload failed');
                    addLog(`Upload failed: ${data.error || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                showError('uploadResults', error.message);
                addLog(`Upload error: ${error.message}`, 'error');
            }
        }

        async function runFullDashboard() {
            addLog('Running full test suite...');
            
            const summaryDiv = document.getElementById('summaryResults');
            const detailDiv = document.getElementById('detailResults');
            
            summaryDiv.innerHTML = '<div class="loading-spinner"></div> Running tests...';
            summaryDiv.style.display = 'block';
            
            try {
                const response = await fetch(`${API_URL}/health/tests`);
                const data = await response.json();
                
                // Summary tab
                let summaryHtml = `<div class="status status-success">TESTS COMPLETED</div>`;
                summaryHtml += `<div class="test-summary">
                    <div class="stat-box">
                        <div class="stat-number">${data.test_results.passed}</div>
                        <div class="stat-label">Passed</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${data.test_results.failed}</div>
                        <div class="stat-label">Failed</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${data.test_results.errors}</div>
                        <div class="stat-label">Errors</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${data.test_results.total}</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>
                <div style="margin-top: 15px; padding: 12px; background: #f0f0f0; border-radius: 6px;">
                    <strong>Summary:</strong> ${data.test_results.summary}
                </div>`;
                
                summaryDiv.innerHTML = summaryHtml;
                
                // Details tab
                let detailHtml = '<strong>Test Results:</strong>';
                if (data.tests && data.tests.length > 0) {
                    data.tests.forEach(test => {
                        const testClass = test.status === 'PASSED' ? 'test-pass' : 'test-fail';
                        detailHtml += `<div class="test-result ${testClass}"><strong>${escapeHtml(test.name)}</strong>: ${test.status}</div>`;
                    });
                } else {
                    detailHtml += '<p style="color: #999;">No test details available</p>';
                }
                
                detailDiv.innerHTML = detailHtml;
                detailDiv.style.display = 'block';
                
                addLog(`Full test suite completed: ${data.test_results.summary}`);
            } catch (error) {
                summaryDiv.innerHTML = `<div class="status status-error">ERROR</div><div class="error-box">${escapeHtml(error.message)}</div>`;
                addLog(`Full test suite failed: ${error.message}`, 'error');
            }
        }

        function switchTab(e, tabName) {
            e.preventDefault();
            
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all tab buttons
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            e.target.classList.add('active');
        }

        // Drag and drop support
        const fileInputWrapper = document.querySelector('.file-input-wrapper');
        if (fileInputWrapper) {
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                fileInputWrapper.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                fileInputWrapper.addEventListener(eventName, () => {
                    fileInputWrapper.style.background = '#f0f4ff';
                });
            });

            ['dragleave', 'drop'].forEach(eventName => {
                fileInputWrapper.addEventListener(eventName, () => {
                    fileInputWrapper.style.background = 'white';
                });
            });

            fileInputWrapper.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                document.getElementById('stepFile').files = files;
                updateFileName();
            });
        }

        // Initial log entry
        const backendUrlLabel = document.getElementById('backendUrlLabel');
        if (backendUrlLabel) {
            backendUrlLabel.textContent = API_BASE;
        }
        addLog('Testing interface loaded. Backend URL: ' + API_URL);
    </script>
</body>
</html>
